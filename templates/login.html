{% extends 'base.html' %}
{% block title %}Iniciar Sesión — Hospital Lanfranco La Hoz{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/Stylelogin.css') }}">
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">
  <img src="{{ url_for('static', filename='img/logoHospital.png') }}" alt="Logo Hospital" style="width:60px; height:60px; object-fit:contain;">
</div>
      <h2>Iniciar Sesión</h2>
      <p>Accede a tu panel de citas médicas</p>
    </div>
    <div class="auth-body">
      <form method="POST">
        <div class="form-group">
          <label>Correo Electrónico <span>*</span></label>
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" class="form-control" placeholder="tucorreo@email.com" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Contraseña <span>*</span></label>
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
          </div>
        </div>
        <button type="submit" class="btn-full"><i class="fas fa-sign-in-alt"></i> &nbsp;Ingresar</button>
      </form>
      <div class="divider">¿No tienes cuenta?</div>
      <div class="auth-footer">
        <a href="{{ url_for('registro') }}" style="display:block;text-align:center;padding:11px;border:2px solid var(--azul-medio);border-radius:10px;font-weight:700;color:var(--azul-medio);">
          <i class="fas fa-user-plus"></i> &nbsp;Crear Cuenta Nueva
        </a>
      </div>
      <div class="auth-footer" style="margin-top:16px;">
        <a href="{{ url_for('index') }}"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
