{% extends 'base.html' %}
{% block title %}Solicitar Cita — Hospital Lanfranco La Hoz{% endblock %}
{% block extra_css %}
<style>
.cita-wrap{max-width:800px;margin:40px auto;padding:0 20px 60px;}
.cita-header{text-align:center;margin-bottom:32px;}
.cita-header h1{font-family:'Montserrat',sans-serif;font-weight:800;font-size:2rem;color:var(--azul);}
.cita-header p{color:#64748b;margin-top:8px;}

.tabs{display:flex;gap:0;background:white;border-radius:14px;box-shadow:0 2px 16px rgba(26,75,140,.1);overflow:hidden;margin-bottom:28px;}
.tab{flex:1;padding:16px;text-align:center;cursor:pointer;font-weight:700;font-size:.9rem;border-bottom:3px solid transparent;color:#94a3b8;transition:.2s;}
.tab.active{color:var(--azul);border-bottom-color:var(--azul);background:#f8fafc;}
.tab:hover:not(.active){background:#f8fafc;}
.tab i{margin-right:8px;}

.panel{display:none;} .panel.active{display:block;}

/* FORMULARIO */
.form-card{background:white;border-radius:16px;box-shadow:0 4px 24px rgba(26,75,140,.1);padding:36px;}
.form-group{margin-bottom:20px;}
.form-group label{display:block;font-weight:700;font-size:.88rem;color:var(--texto);margin-bottom:7px;}
.form-group label span{color:#ef4444;}
.form-control{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:.9rem;font-family:'Open Sans',sans-serif;outline:none;transition:.2s;}
.form-control:focus{border-color:var(--azul-medio);box-shadow:0 0 0 3px rgba(37,99,176,.1);}
select.form-control{cursor:pointer;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.horarios-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px;margin-top:8px;}
.horario-btn{padding:10px 8px;text-align:center;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;font-weight:600;font-size:.85rem;transition:.2s;background:white;}
.horario-btn:hover,.horario-btn.selected{background:var(--azul-medio);color:white;border-color:var(--azul-medio);}
.horario-btn.ocupado{background:#f1f5f9;color:#cbd5e1;cursor:not-allowed;border-color:#f1f5f9;}

/* VOZ IA */
.voz-card{background:linear-gradient(135deg,#0f172a,#1e3a5f);border-radius:16px;padding:36px;text-align:center;color:white;}
.voz-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.6rem;margin-bottom:10px;}
.voz-desc{color:#94a3b8;font-size:.9rem;margin-bottom:28px;}
.mic-btn{width:100px;height:100px;border-radius:50%;border:none;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:white;font-size:2.4rem;cursor:pointer;transition:.3s;box-shadow:0 8px 24px rgba(59,130,246,.4);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;}
.mic-btn:hover{transform:scale(1.08);box-shadow:0 12px 32px rgba(59,130,246,.6);}
.mic-btn.listening{animation:pulse 1.2s infinite;background:linear-gradient(135deg,#ef4444,#dc2626);}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,.5);}70%{box-shadow:0 0 0 20px rgba(239,68,68,0);}100%{box-shadow:0 0 0 0 rgba(239,68,68,0);}}
.voz-status{font-size:.9rem;color:#93c5fd;min-height:24px;margin-bottom:16px;}
.voz-transcript{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px;min-height:80px;color:#e2e8f0;font-size:.9rem;line-height:1.6;text-align:left;margin-bottom:20px;}
.voz-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.voz-step{background:rgba(255,255,255,.06);border-radius:10px;padding:14px;font-size:.8rem;color:#cbd5e1;}
.voz-step .num{font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.3rem;color:#60a5fa;margin-bottom:4px;}
.chat-box{background:rgba(255,255,255,.04);border-radius:12px;padding:16px;max-height:200px;overflow-y:auto;text-align:left;margin-bottom:16px;}
.msg{margin-bottom:10px;font-size:.85rem;line-height:1.5;}
.msg.ia{color:#93c5fd;} .msg.ia::before{content:'🤖 IA: ';}
.msg.user{color:#e2e8f0;} .msg.user::before{content:'🗣️ Tú: ';}
</style>
{% endblock %}

{% block content %}
<div class="cita-wrap">
  <div class="cita-header">
    <h1>📅 Solicitar Cita Médica</h1>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('manual')"><i class="fas fa-keyboard"></i> Solicitud Manual</div>
  </div>

  <!-- ══════ PANEL MANUAL ══════ -->
  <div class="panel active" id="panel-manual">
    <div class="form-card">
      <form method="POST" id="form-cita">
        <input type="hidden" name="tipo" value="manual"/>
        <div class="form-group">
          <label>Especialidad <span>*</span></label>
          <select name="especialidad_id" id="sel-esp" class="form-control" required onchange="cargarMedicos()">
            <option value="">— Selecciona una especialidad —</option>
            {% for esp in especialidades %}
            <option value="{{ esp.id }}">{{ esp.icono }} {{ esp.nombre }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Médico <span>*</span></label>
          <select name="medico_id" id="sel-med" class="form-control" required onchange="cargarHorarios()">
            <option value="">— Primero selecciona una especialidad —</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Fecha <span>*</span></label>
            <input type="date" name="fecha" id="inp-fecha" class="form-control" required
              min="{{ today }}" onchange="cargarHorarios()"/>
          </div>
          <div class="form-group">
            <label>Hora Disponible <span>*</span></label>
            <input type="hidden" name="hora" id="inp-hora" required/>
            <div id="horarios-wrap">
              <p style="color:#94a3b8;font-size:.85rem;">Selecciona médico y fecha primero.</p>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Motivo de Consulta</label>
          <textarea name="motivo" class="form-control" rows="3" placeholder="Describe brevemente el motivo de tu visita..."></textarea>
        </div>
        <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:14px;font-size:1rem;">
          <i class="fas fa-calendar-check"></i> Confirmar Cita
        </button>
      </form>
    </div>
  </div>

  
</div>
{% endblock %}

{% block extra_js %}
<script>
const today = new Date().toISOString().split('T')[0];
document.getElementById('inp-fecha').min = today;

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', (tab==='manual'&&i===0)||(tab==='voz'&&i===1)));
  document.getElementById('panel-manual').classList.toggle('active', tab==='manual');
  document.getElementById('panel-voz').classList.toggle('active', tab==='voz');
}

async function cargarMedicos() {
  const espId = document.getElementById('sel-esp').value;
  const sel = document.getElementById('sel-med');
  sel.innerHTML = '<option>Cargando...</option>';
  if (!espId) { sel.innerHTML = '<option>— Selecciona especialidad primero —</option>'; return; }
  const r = await fetch(`/api/medicos/${espId}`);
  const data = await r.json();
  sel.innerHTML = '<option value="">— Selecciona un médico —</option>' + data.map(m=>`<option value="${m.id}">${m.nombre}</option>`).join('');
  document.getElementById('horarios-wrap').innerHTML = '<p style="color:#94a3b8;font-size:.85rem;">Selecciona fecha para ver horarios.</p>';
}

async function cargarHorarios() {
  const medId = document.getElementById('sel-med').value;
  const fecha = document.getElementById('inp-fecha').value;
  const wrap  = document.getElementById('horarios-wrap');
  if (!medId || !fecha) return;
  wrap.innerHTML = '<p style="color:#94a3b8;font-size:.85rem;">Cargando horarios...</p>';
  const r = await fetch(`/api/horarios/${medId}/${fecha}`);
  const horas = await r.json();
  if (!horas.length) { wrap.innerHTML = '<p style="color:#ef4444;font-size:.85rem;">No hay horarios disponibles para esta fecha.</p>'; return; }
  wrap.innerHTML = '<div class="horarios-grid">' + horas.map(h=>`<div class="horario-btn" onclick="selHora(this,'${h}')">${h}</div>`).join('') + '</div>';
}

function selHora(el, hora) {
  document.querySelectorAll('.horario-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('inp-hora').value = hora;
}

// ── VOZ IA ──────────────────────────────────────────────────────────────────
let recognition, listening = false, chatHistory = [];
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function initSpeech() {
  if (!SpeechRecognition) { alert('Tu navegador no soporta reconocimiento de voz. Usa Chrome.'); return null; }
  const r = new SpeechRecognition();
  r.lang = 'es-PE'; r.continuous = false; r.interimResults = true;
  r.onstart = () => { setStatus('🔴 Escuchando...'); };
  r.onresult = e => {
    let final = '', interim = '';
    for (let i=e.resultIndex;i<e.results.length;i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('transcript').textContent = final || interim || '...';
    if (final) procesarVoz(final.trim());
  };
  r.onerror = e => { setStatus('Error: ' + e.error); stopListening(); };
  r.onend = () => stopListening();
  return r;
}

function toggleVoz() {
  if (listening) { stopListening(); return; }
  if (!recognition) recognition = initSpeech();
  if (!recognition) return;
  listening = true;
  document.getElementById('micBtn').classList.add('listening');
  document.getElementById('micIcon').className = 'fas fa-stop';
  recognition.start();
}
function stopListening() {
  listening = false;
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('micIcon').className = 'fas fa-microphone';
  setStatus('Listo para escuchar');
  try { recognition && recognition.stop(); } catch(e){}
}
function setStatus(msg) { document.getElementById('voz-status').textContent = msg; }

const especialidades_kw = {
  'cardiología':1,'corazón':1,'pediatría':2,'niños':2,'ginecología':3,'mujer':3,
  'traumatología':4,'huesos':4,'medicina general':5,'general':5,'oftalmología':6,'ojos':6,'neurología':7,'cerebro':7,'dermatología':8,'piel':8
};

function procesarVoz(texto) {
  addMsg('user', texto);
  const t = texto.toLowerCase();

  // Detectar especialidad
  for (const [kw, id] of Object.entries(especialidades_kw)) {
    if (t.includes(kw)) {
      addMsg('ia', `Entendido. Voy a registrarte en ${kw.charAt(0).toUpperCase()+kw.slice(1)}. Te llevo al formulario para completar la fecha y hora.`);
      speak(`Perfecto, seleccionando ${kw}. Ahora completa la fecha en el formulario.`);
      setTimeout(()=>{
        switchTab('manual');
        const sel = document.getElementById('sel-esp');
        sel.value = id; cargarMedicos();
        flash(`✅ Especialidad "${kw}" seleccionada desde el asistente de voz.`);
      }, 1500);
      return;
    }
  }
  // Saludos
  if (/hola|buenos|buenas/.test(t)) { addMsg('ia','¡Hola! ¿En qué especialidad necesitas tu cita médica hoy?'); speak('Hola, ¿qué especialidad necesitas?'); return; }
  // Ayuda
  if (/ayuda|no sé|qué/.test(t)) {
    addMsg('ia','Tenemos: Cardiología, Pediatría, Ginecología, Traumatología, Medicina General, Oftalmología, Neurología y Dermatología. ¿Cuál necesitas?');
    speak('Dime qué especialidad necesitas'); return;
  }
  addMsg('ia','No pude identificar la especialidad. Puedes decir por ejemplo: "necesito cardiología" o "quiero pediatría".');
  speak('Por favor dime la especialidad que necesitas');
}

function addMsg(role, text) {
  const box = document.getElementById('chatBox');
  const d = document.createElement('div');
  d.className = `msg ${role}`; d.textContent = text;
  box.appendChild(d); box.scrollTop = box.scrollHeight;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-PE'; u.rate = 0.95; speechSynthesis.speak(u);
}

function resetChat() {
  document.getElementById('chatBox').innerHTML = '<div class="msg ia">Hola, soy el asistente del Hospital Lanfranco La Hoz. ¿En qué especialidad necesitas tu cita?</div>';
  document.getElementById('transcript').textContent = 'Presiona el micrófono y habla...';
  setStatus('Listo para escuchar');
}

function flash(msg) {
  const d = document.createElement('div');
  d.className='flash success'; d.innerHTML=`<i class="fas fa-check-circle"></i> ${msg}`;
  document.querySelector('.flash-container').prepend(d);
  setTimeout(()=>d.remove(),4000);
}
</script>
{% endblock %}
